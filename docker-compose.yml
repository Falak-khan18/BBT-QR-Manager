services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bbt_qr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bbt_qr"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/bbt_qr"
      SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-key}
      CORS_ORIGINS: "http://localhost:3000"
      REDIRECT_BASE_URL: "http://localhost:8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        alembic upgrade head
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
        NEXT_PUBLIC_REDIRECT_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
